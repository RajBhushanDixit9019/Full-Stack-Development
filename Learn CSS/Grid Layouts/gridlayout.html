<!DOCTYPE html>
<html>
  <head>
    <title>Grid Layouts Introduction</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      .main-container {
        display: grid;
        grid-template-columns: 1fr; /* One single column taking up the whole width */
        
        /* Here is the magic! We define all 5 rows right here: */
        grid-template-rows: 100vh 100vh 100vh 100vh 300px; 
      }
      
      .section {
        background-color: #161320;
        color: white;
        text-align: center;
        font-size: 2em;
        border: 1px solid #fffdfd;
        
        /* Notice we deleted height and width here! Grid handles it now. */
        display: flex; /* We can use flexbox INSIDE the grid to center the text! */
        justify-content: center;
        align-items: center;
      }
     
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="section" id="header">Header</div> 
      <div class="section" id="aboutme">About Me</div>
      <div class="section" id="myprojects">My Projects</div>
      <div class="section" id="contactus">Contact Us</div>
      <div class="section" id="footer">Footer</div>
    </div>
  </body>
</html>
