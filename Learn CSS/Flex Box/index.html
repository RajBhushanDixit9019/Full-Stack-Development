<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexBox in CSS</title>
    <style>
      .container {
        /* Corrected class name */
        display: flex;
        flex-direction: row;
        justify-content: center;
        border-radius: 10px;
        padding: 20px;
        gap: 10px;
        background-color: #f4f7f6; /* Added for visibility */
        margin: 20px; /* Added for visibility */
        border: 1px solid grey; /* Added for visibility */
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1); /* Added for visibility */
      }
      .items {
        border: 1px solid black;
        padding: 10px;
        width: 50px;
        height: 50px;
        background-color: lightblue; /* Added for visibility */
      }
    </style>
  </head>
  <body>
    <h1 class="heading">Flex Box in CSS</h1>
    <div class="container">
      <div class="items">1</div>
      <div class="items">2</div>
      <div class="items">3</div>
      <div class="items">4</div>
      <div class="items">5</div>
      <div class="items">6</div>
      <div class="items">7</div>
      <div class="items">8</div>
      <div class="items">9</div>
      <div class="items">10</div>
    </div>
  </body>
</html>
