<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Swatches</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        display: flex;
        justify-content: center;
        padding: 2rem;
        background: #fafafa;
      }
      .palette {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .swatch {
        background: var(--c);
        color: #fff;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        border-radius: 6px;
        opacity: 0;
        animation: fadeIn 0.6s ease forwards;
        animation-delay: calc(var(--i) * 0.1s);
      }
      .swatch:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <section class="palette">
      <div class="swatch" style="--c: #ff6b6b">#ff6b6b</div>
      <div class="swatch" style="--c: #4caf50">#4caf50</div>
      <div class="swatch" style="--c: #2196f3">#2196f3</div>
      <div class="swatch" style="--c: #ffeb3b">#ffeb3b</div>
      <div class="swatch" style="--c: #9c27b0">#9c27b0</div>
      <div class="swatch" style="--c: #607d8b">#607d8b</div>
    </section>
  </body>
</html>
