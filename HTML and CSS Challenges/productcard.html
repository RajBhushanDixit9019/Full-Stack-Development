<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: #ecdcdc;
            /* Added min-height and display: grid to properly center the card */
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px; /* Added padding for small screens */
        }

        .product-card {
            display: flex;
            flex-direction: column;
            background-color: rgb(255, 255, 255); /* Changed to white for a cleaner look */
            padding: 16px; /* A bit more padding */
            margin: 20px;
            width: 300px;
            border-radius: 16px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            /* MOVED transition to the base class */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative; /* Needed for the sale badge */
            overflow: hidden; /* Keeps badge corners rounded */
        }

        .product-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transform: translateY(-5px);
        }

        /* --- STRETCH GOAL: SALE BADGE --- */
        .sale-badge {
            position: absolute;
            top: 12px;
            right: -30px;
            background-color: #dc3545;
            color: white;
            padding: 4px 30px;
            font-size: 14px;
            font-weight: bold;
            transform: rotate(45deg);
            z-index: 1;
        }
        
        .product-img {
            width: 100%;
        }

        .product-img img {
            width: 100%;
            height: auto;
            display: block; /* Removes image bottom margin */
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .product-title,
        .product-category,
        .product-description,
        .product-price {
            /* Added text-align here for explicit control */
            text-align: center;
        }

        .product-title h2 {
            font-size: 20px;
            color: black;
            margin-bottom: 8px; /* Adjusted spacing */
        }

        .product-category p {
            font-size: 14px; /* Slightly smaller */
            color: gray;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase; /* Looks more like a tag */
        }

        .product-description p {
            font-size: 16px;
            color: #333;
            margin-bottom: 16px; /* More spacing */
            line-height: 1.4;
        }

        .product-price p {
            font-size: 30px;
            color: green;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .add-to-cart-btn {
            padding: 12px 20px; /* A little taller */
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            /* MOVED transition to base class */
            transition: background-color 0.3s ease;
        }

        .add-to-cart-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <article class="product-card">
        <div class="sale-badge">-20%</div> <figure class="product-img">
            <img src="https://media.istockphoto.com/id/679539190/photo/indian-made-mens-shoes.jpg?s=1024x1024&w=is&k=20&c=jOaARCGoEkZspiCzV_3QBjLt2qxhjJC6M2oxCMhITiQ=" alt="Brown leather men's casual shoes">
        </figure>

        <div class="product-title">
            <h2>Bata Casual Men Shoes</h2>
        </div>
        <div class="product-category">
            <p>Men Shoes</p>
        </div>
        <div class="product-description">
            <p>The most comfortable men's casual and party wear shoes.</p>
        </div>
        <div class="product-price">
            <p>$99.99</p>
        </div>
        
        <button class="add-to-cart-btn">Add to Cart</button>
    </article>
</body>
</html>
