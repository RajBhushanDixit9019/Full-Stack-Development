<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard header</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }
      .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        margin: 20px;
        background-color: #4a90e2;
        color: #fff;
        border-radius: 8px;
      }
      .logo {
        font-size: 24px;
        font-weight: bold;
        color: #fff;
      }
      .search-bar {
        padding: 8px 16px;
        border: 1px solid #fff;
        border-radius: 4px;
        color: #fff;
        background: transparent;
        width: 300px;
        outline: none;
      }
      .profile-btn {
        padding: 10px;
        border: 1px solid #fff;
        border-radius: 4px;
        color: #fff;
        background: transparent;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      .profile-btn:hover {
        background: #fff;
        color: #4a90e2;
      }
    </style>
  </head>
  <body>
    <header class="top-nav">
      <div class="logo">BioMass Ops</div>
      <input
        type="text"
        class="search-bar"
        placeholder="🔍 Search inventory..."
      />
      <button class="profile-btn">Raj D.</button>
    </header>
  </body>
</html>
