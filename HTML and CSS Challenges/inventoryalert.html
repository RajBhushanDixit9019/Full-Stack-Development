<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jawar husk Inventory Alert</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .status-badge {
            display:flex;
            flex-direction: row;
            gap:8px;
            justify-content: center;
            align-items: center;
            padding: 12px 20px;
            background-color: #ff4d4d;
            color: #fff;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
  </head>
  <body>
    <div class="status-badge">
      <span class="icon">⚠️</span>
      <span class="text">Low Stock: Jawar Husk</span>
    </div>
  </body>
</html>
